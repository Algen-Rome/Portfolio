<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Projects</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 40px; color: white;">

  <div id="login-section">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email" style="display:block; margin-bottom:10px; padding:8px;">
    <input type="password" id="password" placeholder="Password" style="display:block; margin-bottom:10px; padding:8px;">
    <button id="login-btn">Login</button>
    <p id="login-error" style="color:red;"></p>
  </div>

  <div id="admin-section" style="display:none;">
    <h2>Add Project</h2>
    <input type="text" id="title" placeholder="Title" style="display:block; margin-bottom:10px; padding:8px; width:300px;">
    <textarea id="description" placeholder="Description" style="display:block; margin-bottom:10px; padding:8px; width:300px;"></textarea>
    <input type="text" id="image" placeholder="Image URL" style="display:block; margin-bottom:10px; padding:8px; width:300px;">
    <input type="text" id="link" placeholder="Project Link" style="display:block; margin-bottom:10px; padding:8px; width:300px;">
    <button id="add-btn">Add Project</button>

    <h2>Existing Projects</h2>
    <div id="project-list"></div>

    <button id="logout-btn" style="margin-top:20px;">Logout</button>
  </div>

  <script type="module" src="jscript/admin.js"></script>
</body>
</html>
